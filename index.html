<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>安安大逃亡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: 'Microsoft YaHei', monospace; }
#wrap { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
#titleBar { color: #fbbf24; font-size: clamp(14px, 3vw, 24px); letter-spacing: 3px; text-shadow: 0 0 16px #fbbf24; padding: 6px 0 4px; flex-shrink: 0; text-align: center; width: 100%; }
#gameCanvas { display: block; cursor: crosshair; touch-action: none; flex-shrink: 0; }
#hintBar { color: #64748b; font-size: clamp(10px, 1.8vw, 13px); padding: 3px 0; text-align: center; flex-shrink: 0; }
#overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.82); display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:10; }
#overlay.show { display:flex; }
#overlayIcon { font-size: clamp(40px, 8vw, 72px); }
#overlayTitle { font-size: clamp(22px, 5vw, 36px); font-weight:bold; color:#fff; }
#overlayMsg { font-size: clamp(13px, 2.5vw, 18px); color:#cbd5e1; }
#overlayScore { font-size: clamp(16px, 3vw, 22px); color:#fbbf24; }
#restartBtn { margin-top:14px; padding: clamp(10px,2vw,14px) clamp(28px,5vw,48px); font-size: clamp(15px,3vw,20px); font-weight:bold; border:none; border-radius:10px; cursor:pointer; font-family:inherit; letter-spacing:2px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="titleBar">🏔️ 安安大逃亡</div>
  <canvas id="gameCanvas"></canvas>
  <div id="hintBar">👆 点击移动安安 | 点击怪物射击 | 靠近山洞点击进入 | 洞内自动捡子弹</div>
</div>
<div id="overlay">
  <div id="overlayIcon">🏆</div>
  <div id="overlayTitle">恭喜安安！</div>
  <div id="overlayMsg">消灭了所有黑毛球和钻石怪！</div>
  <div id="overlayScore"></div>
  <button id="restartBtn" onclick="initGame()">再玩一次</button>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// roundRect兼容函数（旧版手机浏览器不支持原生roundRect）
function rrect(c, x, y, w, h, r) {
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

// 动态计算画布尺寸：填满屏幕减去标题和提示栏
function calcSize() {
  const titleH = document.getElementById('titleBar').offsetHeight;
  const hintH = document.getElementById('hintBar').offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight - titleH - hintH - 2;
  return { vw, vh };
}

let VW, VH;
function resizeCanvas() {
  const {vw, vh} = calcSize();
  VW = vw; VH = vh;
  canvas.width = VW; canvas.height = VH;
  canvas.style.width = VW + 'px';
  canvas.style.height = VH + 'px';
}
// resizeCanvas moved to window.load

// 世界地图大小（屏幕3倍），resize后重新计算
let WW, WH, CAVE;
const MAP_DECOS = [];
function initWorldSize() {
  WW = Math.max(VW * 3, 900);
  WH = Math.max(VH * 3, 600);
  CAVE = { x: WW/2, y: WH/2 - 60, r: 55 };
  generateGrassTexture();
  generateMapDecos();
}
// initWorldSize called from window.load

// 窗口resize时重新适配
window.addEventListener('resize', () => {
  resizeCanvas();
  initWorldSize();
  // 更新摄像机
  if(G && G.player) updateCamera(G.player.x, G.player.y);
});

const BULLET_SPEED = 9;
const BULLET_REGEN = 5000;
let _id = 0;
const uid = () => ++_id;
const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const norm = (dx,dy) => { const l=Math.hypot(dx,dy)||1; return [dx/l,dy/l]; };

// 摄像机
let cam = { x: 0, y: 0 };

function worldToScreen(wx, wy) {
  return { x: wx - cam.x, y: wy - cam.y };
}
function screenToWorld(sx, sy) {
  return { x: sx + cam.x, y: sy + cam.y };
}

function updateCamera(px, py) {
  cam.x = px - VW/2;
  cam.y = py - VH/2;
  cam.x = Math.max(0, Math.min(WW - VW, cam.x));
  cam.y = Math.max(0, Math.min(WH - VH, cam.y));
}

const randPos = () => {
  let x, y;
  do {
    x = 80 + Math.random() * (WW - 160);
    y = 80 + Math.random() * (WH - 160);
  } while (dist({x,y}, CAVE) < 300);
  return {x, y};
};

let G = {};

function initGame() {
  _id = 0;
  document.getElementById('overlay').classList.remove('show');
  G = {
    phase: 'play',
    tick: 0,
    score: 0,
    player: {
      x: CAVE.x, y: CAVE.y + 100,
      inCave: false, moving: false,
      tx: CAVE.x, ty: CAVE.y + 100,
      invincible: 0,
    },
    goldBullets: 0,
    normalBullets: 0,
    bullets: [],
    projectiles: [],
    pickups: makePickups(),
    furballs: Array.from({length:3}, (_, i) => ({
      id:uid(), ...randPos(), hp:100, maxHp:100,
      weapon:{hp:200,maxHp:200}, speed:0.25, size:24,
      wanderAngle: Math.random()*Math.PI*2,
    })),
    diamonds: Array.from({length:5}, () => ({
      id:uid(), ...randPos(), hp:10000, maxHp:10000,
      weapon:{hp:10000,maxHp:10000}, speed:0.175, size:20,
      cooldown:0, wanderAngle: Math.random()*Math.PI*2,
    })),
    triangles: Array.from({length:100}, () => ({
      id:uid(), ...randPos(), hp:100, maxHp:100,
      weapon:{hp:50,maxHp:50}, speed:0.35, size:12,
      aggro:false, wanderAngle: Math.random()*Math.PI*2,
    })),
    squares: Array.from({length:10}, () => ({
      id:uid(), ...randPos(), hp:50, maxHp:50,
      weapon:{hp:100,maxHp:100}, speed:0.225, size:14,
      wanderAngle: Math.random()*Math.PI*2,
    })),
    warning: '', warningTimer: 0,
    lastTs: 0,
  };
}

function makePickups() {
  const arr = [];
  for(let i=0;i<20;i++) arr.push({id:uid(), x:CAVE.x-28+Math.random()*56, y:CAVE.y-20+Math.random()*36, type:'gold', taken:false, regenAt:0});
  for(let i=0;i<19;i++) arr.push({id:uid(), x:CAVE.x-28+Math.random()*56, y:CAVE.y-20+Math.random()*36, type:'normal', taken:false, regenAt:0});
  return arr;
}

// ── 点击输入 ──
canvas.addEventListener('click', e => {
  if(G.phase !== 'play') return;
  const r = canvas.getBoundingClientRect();
  const sx = (e.clientX - r.left) * (canvas.width / r.width);
  const sy = (e.clientY - r.top) * (canvas.height / r.height);
  const {x:wx, y:wy} = screenToWorld(sx, sy);

  const p = G.player;

  // 点击山洞区域
  if(dist({x:wx,y:wy}, CAVE) < CAVE.r + 20) {
    if(!p.inCave && dist(p, CAVE) < 130) {
      p.inCave = true;
      return;
    }
    if(p.inCave) {
      p.inCave = false;
      p.x = CAVE.x; p.y = CAVE.y + 100;
      p.moving = false;
      p.invincible = 180;
      return;
    }
  }

  if(p.inCave) return;

  // 点击怪物 → 射击
  const all = [...G.furballs,...G.diamonds,...G.triangles,...G.squares];
  for(const e of all) {
    if(dist({x:wx,y:wy}, e) < e.size + 12) {
      fireBullet(e.x, e.y); return;
    }
  }

  // 点击地面 → 移动
  p.tx = wx; p.ty = wy; p.moving = true;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('click', {clientX:t.clientX, clientY:t.clientY}));
}, {passive:false});

function fireBullet(tx, ty) {
  const p = G.player;
  if(G.goldBullets <= 0 && G.normalBullets <= 0) {
    G.warning = '没子弹！进山洞补充！'; G.warningTimer = 100; return;
  }
  let gold = false;
  if(G.goldBullets > 0) { G.goldBullets--; gold = true; }
  else G.normalBullets--;
  const [dx,dy] = norm(tx - p.x, ty - p.y);
  G.bullets.push({id:uid(), x:p.x, y:p.y, dx, dy, gold, angle:0});
}

const inCaveZone = (x,y) => dist({x,y}, CAVE) < CAVE.r * 0.85;

const wander = (e) => {
  e.wanderAngle += (Math.random()-0.5)*0.14;
  const nx = e.x + Math.cos(e.wanderAngle)*e.speed;
  const ny = e.y + Math.sin(e.wanderAngle)*e.speed;
  if(nx < 30 || nx > WW-30) e.wanderAngle = Math.PI - e.wanderAngle;
  else if(ny < 30 || ny > WH-30) e.wanderAngle = -e.wanderAngle;
  else if(!inCaveZone(nx,ny)) { e.x=nx; e.y=ny; }
  else e.wanderAngle += Math.PI * 0.5;
};

const moveToward = (e, tx, ty) => {
  if(inCaveZone(e.x,e.y)) return;
  const [dx,dy] = norm(tx-e.x, ty-e.y);
  const nx=e.x+dx*e.speed, ny=e.y+dy*e.speed;
  if(!inCaveZone(nx,ny)) { e.x=nx; e.y=ny; }
};

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - G.lastTs, 32);
  G.lastTs = ts;
  if(G.phase !== 'play') return;
  G.tick++;

  const p = G.player;
  if(p.invincible > 0) p.invincible--;

  // 玩家移动
  if(!p.inCave && p.moving) {
    const d = dist(p, {x:p.tx,y:p.ty});
    if(d < 5) { p.moving = false; }
    else {
      const [dx,dy] = norm(p.tx-p.x, p.ty-p.y);
      p.x += dx*3.5; p.y += dy*3.5;
      p.x = Math.max(20, Math.min(WW-20, p.x));
      p.y = Math.max(20, Math.min(WH-20, p.y));
    }
  }

  updateCamera(p.x, p.y);

  // 危险提示
  const bossNear = [...G.furballs,...G.diamonds].some(e => dist(e,p)<180);
  if(!p.inCave && bossNear) { G.warning='危险！快进山洞！'; G.warningTimer=90; }
  if(G.warningTimer>0) G.warningTimer--; else G.warning='';

  // 进洞捡子弹
  if(p.inCave) {
    G.pickups.forEach(pk => {
      if(!pk.taken) {
        pk.taken=true; pk.regenAt=ts+BULLET_REGEN;
        if(pk.type==='gold') G.goldBullets++; else G.normalBullets++;
      }
    });
  }
  G.pickups.forEach(pk => { if(pk.taken && ts>pk.regenAt) pk.taken=false; });

  // 子弹移动
  G.bullets = G.bullets.filter(b => dist(b,p) < WW);
  G.bullets.forEach(b => { b.x+=b.dx*BULLET_SPEED; b.y+=b.dy*BULLET_SPEED; });

  // 钻石抛射物
  G.projectiles = G.projectiles.filter(b => dist(b,p) < 800);
  G.projectiles.forEach(b => {
    b.x+=b.dx*5; b.y+=b.dy*5; b.angle=(b.angle||0)+0.3;
    if(!p.inCave && !p.invincible && dist(b,p)<16) { G.phase='lose'; showOverlay(false); }
  });

  // 子弹打怪
  const dmg = (e, b) => {
    const d = b.gold ? 1000 : 100;
    if(e.weapon.hp>0) e.weapon.hp=Math.max(0,e.weapon.hp-d);
    else e.hp=Math.max(0,e.hp-d);
    G.score+=10;
  };
  G.bullets = G.bullets.filter(b => {
    let hit=false;
    [...G.furballs,...G.diamonds,...G.triangles,...G.squares].forEach(e=>{
      if(!hit && dist(b,e)<e.size+6){dmg(e,b);hit=true;}
    });
    return !hit;
  });

  G.furballs=G.furballs.filter(e=>e.hp>0);
  G.diamonds=G.diamonds.filter(e=>e.hp>0);
  G.triangles=G.triangles.filter(e=>e.hp>0);
  G.squares=G.squares.filter(e=>e.hp>0);

  if(G.furballs.length===0&&G.diamonds.length===0){G.phase='win';showOverlay(true);return;}

  // 怪物移动
  G.furballs.forEach(e => {
    if(p.inCave) wander(e);
    else moveToward(e, CAVE.x, CAVE.y);
  });

  G.diamonds.forEach(e => {
    if(p.inCave) { wander(e); return; }
    moveToward(e, p.x, p.y);
    e.cooldown--;
    if(dist(e,p)<250 && e.cooldown<=0) {
      const [dx,dy]=norm(p.x-e.x,p.y-e.y);
      G.projectiles.push({id:uid(),x:e.x,y:e.y,dx,dy,angle:0});
      e.cooldown=80;
    }
  });

  G.triangles.forEach(e => {
    if(p.inCave) { e.aggro=false; wander(e); return; }
    if(dist(e,p)<220) e.aggro=true;
    if(e.aggro) moveToward(e,p.x,p.y);
    else wander(e);
    if(!p.invincible && dist(e,p)<e.size+12){G.phase='lose';showOverlay(false);}
  });

  G.squares.forEach(e => {
    wander(e);
    if(!p.inCave&&!p.invincible&&dist(e,p)<e.size+12){G.phase='lose';showOverlay(false);}
  });

  G.furballs.forEach(e=>{
    if(!p.inCave&&!p.invincible&&dist(e,p)<e.size+12){G.phase='lose';showOverlay(false);}
  });

  drawScene();
}

// ── 地图装饰物（启动时预生成，世界坐标）──
// 离屏草地纹理（预生成一次，重复铺贴）
let grassTexture = null;
const TILE = 200; // 纹理块尺寸

function generateGrassTexture() {
  const tc = document.createElement('canvas');
  tc.width = TILE; tc.height = TILE;
  const tx = tc.getContext('2d');

  // 底色：枯黄泥土
  tx.fillStyle = '#8b7d4a';
  tx.fillRect(0, 0, TILE, TILE);

  // 大面积枯草色斑块
  for(let i=0;i<60;i++){
    const x=Math.random()*TILE, y=Math.random()*TILE;
    const w=6+Math.random()*22, h=4+Math.random()*14;
    const g=tx.createRadialGradient(x,y,0,x,y,w);
    const r=100+Math.random()*50|0, gr=90+Math.random()*40|0, b=20+Math.random()*20|0;
    g.addColorStop(0,`rgba(${r},${gr},${b},0.7)`);
    g.addColorStop(1,`rgba(${r},${gr},${b},0)`);
    tx.fillStyle=g;
    tx.beginPath(); tx.ellipse(x,y,w,h,Math.random()*Math.PI,0,Math.PI*2); tx.fill();
  }

  // 绿色草丛色块（分散的深浅绿）
  for(let i=0;i<80;i++){
    const x=Math.random()*TILE, y=Math.random()*TILE;
    const w=3+Math.random()*12, h=2+Math.random()*8;
    const dark=Math.random()<0.4;
    const g=tx.createRadialGradient(x,y,0,x,y,w);
    if(dark){
      g.addColorStop(0,`rgba(${20+Math.random()*30|0},${60+Math.random()*40|0},${10+Math.random()*15|0},0.85)`);
    } else {
      g.addColorStop(0,`rgba(${50+Math.random()*50|0},${100+Math.random()*70|0},${15+Math.random()*25|0},0.75)`);
    }
    g.addColorStop(1,'rgba(0,0,0,0)');
    tx.fillStyle=g;
    tx.beginPath(); tx.ellipse(x,y,w,h,Math.random()*Math.PI,0,Math.PI*2); tx.fill();
  }

  // 细草丝（密集短线，模拟照片中的草茎）
  for(let i=0;i<300;i++){
    const x=Math.random()*TILE, y=Math.random()*TILE;
    const len=3+Math.random()*9;
    const angle=-Math.PI/2 + (Math.random()-0.5)*0.8;
    const green=Math.random()<0.55;
    tx.strokeStyle = green
      ? `rgba(${30+Math.random()*60|0},${80+Math.random()*80|0},${10+Math.random()*20|0},${0.4+Math.random()*0.5})`
      : `rgba(${110+Math.random()*50|0},${95+Math.random()*40|0},${25+Math.random()*20|0},${0.3+Math.random()*0.4})`;
    tx.lineWidth = 0.8+Math.random()*1.2;
    tx.lineCap='round';
    tx.beginPath();
    tx.moveTo(x, y);
    tx.lineTo(x + Math.cos(angle)*len, y + Math.sin(angle)*len);
    tx.stroke();
  }

  // 泥土小点
  for(let i=0;i<120;i++){
    const x=Math.random()*TILE, y=Math.random()*TILE;
    tx.fillStyle=`rgba(${80+Math.random()*40|0},${65+Math.random()*30|0},${20+Math.random()*15|0},${0.2+Math.random()*0.35})`;
    tx.beginPath(); tx.arc(x,y,0.5+Math.random()*2,0,Math.PI*2); tx.fill();
  }

  grassTexture = tc;
}

function generateMapDecos() {
  MAP_DECOS.length = 0;
  const rng = (a,b) => a + Math.random()*(b-a);

  // 石头
  for(let i=0;i<40;i++){
    let x,y;
    do { x=rng(60,WW-60); y=rng(60,WH-60); } while(dist({x,y},CAVE)<220);
    MAP_DECOS.push({ type:'rock', x, y, r:rng(10,26), angle:rng(0,Math.PI*2) });
  }
  // 树
  for(let i=0;i<30;i++){
    let x,y;
    do { x=rng(60,WW-60); y=rng(60,WH-60); } while(dist({x,y},CAVE)<240);
    MAP_DECOS.push({ type:'tree', x, y, r:rng(18,34) });
  }
  // 水坑
  for(let i=0;i<10;i++){
    let x,y;
    do { x=rng(80,WW-80); y=rng(80,WH-80); } while(dist({x,y},CAVE)<200);
    MAP_DECOS.push({ type:'puddle', x, y, rw:rng(25,55), rh:rng(14,30), angle:rng(0,Math.PI) });
  }
  // 小花点缀
  for(let i=0;i<150;i++){
    MAP_DECOS.push({ type:'flower', x:rng(0,WW), y:rng(0,WH),
      c:['#fbbf24','#f9a8d4','#c4b5fd','#fb7185','#fff','#fed7aa'][Math.random()*6|0],
      r: 1.5+Math.random()*2 });
  }
}

function drawTerrain() {
  // 铺贴草地纹理（用 pattern 重复）
  if(grassTexture) {
    const pat = ctx.createPattern(grassTexture, 'repeat');
    ctx.fillStyle = pat;
    ctx.fillRect(cam.x, cam.y, VW, VH);
  } else {
    ctx.fillStyle = '#7a8040';
    ctx.fillRect(cam.x, cam.y, VW, VH);
  }

  // 大面积深浅变化叠加（让不同区域草色有变化）
  const vx=cam.x, vy=cam.y;
  for(let i=0;i<12;i++){
    const bx = vx + (i*197+vx*0.05) % VW;
    const by = vy + (i*157+vy*0.05) % VH;
    const bg = ctx.createRadialGradient(bx,by,10,bx,by,80+i*15);
    const dark = i%3===0;
    if(dark){
      bg.addColorStop(0,'rgba(40,55,10,0.18)');
    } else {
      bg.addColorStop(0,'rgba(130,110,40,0.12)');
    }
    bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;
    ctx.fillRect(vx,vy,VW,VH);
  }

  // 世界边界土路感
  ctx.strokeStyle='rgba(60,45,15,0.6)'; ctx.lineWidth=12; ctx.setLineDash([]);
  ctx.strokeRect(6,6,WW-12,WH-12);

  // 渲染装饰物（只画可见范围）
  const vx1=cam.x-70, vx2=cam.x+VW+70, vy1=cam.y-70, vy2=cam.y+VH+70;
  // 先画水坑（在其他物体下面）
  for(const d of MAP_DECOS) {
    if(d.x<vx1||d.x>vx2||d.y<vy1||d.y>vy2) continue;
    if(d.type==='puddle') drawPuddle(d.x, d.y, d.rw, d.rh, d.angle);
    else if(d.type==='flower') {
      ctx.fillStyle=d.c;
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,200,0.8)';
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r*0.4,0,Math.PI*2); ctx.fill();
    }
  }
  // 再画石头和树（有高度感，后绘制）
  for(const d of MAP_DECOS) {
    if(d.x<vx1||d.x>vx2||d.y<vy1||d.y>vy2) continue;
    if(d.type==='rock') drawRock45(d.x, d.y, d.r, d.angle);
    else if(d.type==='tree') drawTree45(d.x, d.y, d.r);
  }
}

// 45度石头（有顶面、侧面、阴影）
function drawRock45(x, y, r, angle) {
  ctx.save(); ctx.translate(x, y);
  // 地面阴影
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(r*0.3, r*0.4, r*1.1, r*0.45, 0, 0, Math.PI*2); ctx.fill();
  // 侧面（暗）
  ctx.fillStyle='#4a4035';
  ctx.beginPath();
  ctx.ellipse(0, r*0.25, r*0.85, r*0.4, 0, 0, Math.PI*2); ctx.fill();
  // 顶面（亮）
  const rg = ctx.createRadialGradient(-r*0.2,-r*0.2,r*0.1, 0,0,r);
  rg.addColorStop(0,'#b0a898'); rg.addColorStop(0.6,'#8a7d6e'); rg.addColorStop(1,'#5c5040');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.ellipse(0,-r*0.15,r*0.85,r*0.55,angle,0,Math.PI*2); ctx.fill();
  // 高光
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(-r*0.25,-r*0.3,r*0.25,r*0.12,-0.4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// 45度树（圆形树冠+树干+阴影）
function drawTree45(x, y, r) {
  ctx.save(); ctx.translate(x, y);
  // 地面阴影（椭圆，45度拉长）
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(r*0.5, r*0.6, r*1.1, r*0.4, 0, 0, Math.PI*2); ctx.fill();
  // 树干
  ctx.fillStyle='#6b4423';
  ctx.beginPath(); rrect(ctx,-r*0.18, r*0.1, r*0.36, r*0.55, 3); ctx.fill();
  ctx.fillStyle='#4a2e14';
  ctx.beginPath(); rrect(ctx,-r*0.18, r*0.1, r*0.1, r*0.55, 3); ctx.fill();
  // 树冠背面（深色）
  ctx.fillStyle='#1a5c1a';
  ctx.beginPath(); ctx.arc(0, r*0.15, r, 0, Math.PI*2); ctx.fill();
  // 树冠主色
  const tg = ctx.createRadialGradient(-r*0.25,-r*0.3,r*0.1, 0,0,r);
  tg.addColorStop(0,'#4ade80'); tg.addColorStop(0.5,'#22c55e'); tg.addColorStop(1,'#15803d');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.arc(0, -r*0.1, r, 0, Math.PI*2); ctx.fill();
  // 树冠高光
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.arc(-r*0.3,-r*0.4,r*0.35,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// 水坑
function drawPuddle(x, y, rw, rh, angle) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  // 水体
  const pg = ctx.createRadialGradient(0,0,2, 0,0,rw);
  pg.addColorStop(0,'rgba(147,197,253,0.85)');
  pg.addColorStop(0.6,'rgba(59,130,246,0.7)');
  pg.addColorStop(1,'rgba(30,64,175,0.5)');
  ctx.fillStyle=pg;
  ctx.beginPath(); ctx.ellipse(0,0,rw,rh,0,0,Math.PI*2); ctx.fill();
  // 水面反光
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.ellipse(-rw*0.2,-rh*0.2,rw*0.35,rh*0.18,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(rw*0.15,rh*0.1,rw*0.15,rh*0.08,0.2,0,Math.PI*2); ctx.fill();
  // 岸边
  ctx.strokeStyle='rgba(100,140,60,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0,0,rw,rh,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

// 伪随机数（用种子，避免每帧变化）
function rndSeed(seed, min, max) {
  const x = Math.sin(seed*9301+49297)*233280;
  return min + (x - Math.floor(x))*(max-min);
}

// ── 绘制主函数 ──
function drawScene() {
  const p = G.player;
  ctx.clearRect(0,0,VW,VH);
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // 写实草地地形
  drawTerrain();

  drawCave();
  G.pickups.forEach(pk=>drawPickup(pk));
  G.furballs.forEach(e=>drawFurball(e));
  G.diamonds.forEach(e=>drawDiamond(e));
  G.triangles.forEach(e=>drawTriangle(e));
  G.squares.forEach(e=>drawSquare(e));
  G.bullets.forEach(b=>drawBullet(b));
  G.projectiles.forEach(b=>drawDiamondProj(b));

  if(p.inCave) {
    // 洞内暗幕
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.arc(CAVE.x,CAVE.y,CAVE.r*0.88,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fbbf24';
    ctx.beginPath(); ctx.arc(CAVE.x,CAVE.y,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fef9c3'; ctx.font='bold 13px Microsoft YaHei'; ctx.textAlign='center';
    ctx.fillText('已捡起子弹！点击山洞退出',CAVE.x,CAVE.y-CAVE.r-12);
  } else {
    // 移动指示
    if(p.moving){
      ctx.strokeStyle='rgba(251,191,36,0.35)'; ctx.lineWidth=2; ctx.setLineDash([6,5]);
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.tx,p.ty); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(251,191,36,0.45)';
      ctx.beginPath(); ctx.arc(p.tx,p.ty,5,0,Math.PI*2); ctx.fill();
    }
    // 无敌闪烁
    if(!p.invincible||Math.floor(p.invincible/8)%2===0) drawStickMan(p.x,p.y,p.moving);
    if(p.invincible>0){
      ctx.fillStyle='rgba(251,191,36,0.9)';
      ctx.beginPath(); rrect(ctx,p.x-40,p.y-52,80,18,5); ctx.fill();
      ctx.fillStyle='#000'; ctx.font='bold 11px Microsoft YaHei'; ctx.textAlign='center';
      ctx.fillText(`🛡️无敌 ${Math.ceil(p.invincible/60)}秒`,p.x,p.y-38);
    }
  }

  // 进洞提示
  if(!p.inCave && dist(p,CAVE)<140){
    ctx.fillStyle='rgba(16,185,129,0.88)';
    ctx.beginPath(); rrect(ctx,CAVE.x-65,CAVE.y+CAVE.r+5,130,24,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 13px Microsoft YaHei'; ctx.textAlign='center';
    ctx.fillText('点击山洞进入',CAVE.x,CAVE.y+CAVE.r+22);
  }

  ctx.restore();

  // ── HUD（屏幕坐标，不跟随摄像机）──
  drawHUD();
  drawMinimap();
}

function drawCave(){
  const {x,y,r}=CAVE;
  ctx.save();
  ctx.fillStyle='#6b7280';
  ctx.beginPath(); ctx.ellipse(x,y,r*1.15,r*0.9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4b5563';
  ctx.beginPath(); ctx.ellipse(x-32,y-10,30,22,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+36,y-8,28,20,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111827';
  ctx.beginPath(); ctx.ellipse(x,y+8,36,30,0,Math.PI,Math.PI*2); ctx.fill();
  ctx.fillStyle='#92400e'; ctx.fillRect(x+42,y-10,20,14);
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x-46,y-15); ctx.lineTo(x-22,y-32); ctx.stroke();
  ctx.restore();
}

function drawPickup(pk){
  if(pk.taken) return;
  const s=worldToScreen(pk.x,pk.y);
  if(s.x<-10||s.x>VW+10||s.y<-10||s.y>VH+10) return;
  ctx.save(); ctx.translate(pk.x,pk.y);
  ctx.fillStyle=pk.type==='gold'?'#fbbf24':'#9ca3af';
  if(pk.type==='gold'){ctx.shadowColor='#fbbf24';ctx.shadowBlur=7;}
  ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function drawMatchStick(x1,y1,x2,y2,withHead){
  // 木质棍身：浅黄棕色，有纹理感
  const len = Math.hypot(x2-x1,y2-y1);
  const ang = Math.atan2(y2-y1,x2-x1);
  ctx.save();
  ctx.translate(x1,y1); ctx.rotate(ang);
  // 棍身渐变
  const g = ctx.createLinearGradient(0,-2,0,2);
  g.addColorStop(0,'#d4a96a');
  g.addColorStop(0.4,'#c8893a');
  g.addColorStop(1,'#a0662a');
  ctx.strokeStyle=g; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len,0); ctx.stroke();
  // 木纹线
  ctx.strokeStyle='rgba(100,60,10,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(len*0.3,-1.5); ctx.lineTo(len*0.3,1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(len*0.6,-1.5); ctx.lineTo(len*0.6,1.5); ctx.stroke();
  if(withHead){
    // 火柴头：红褐色椭圆
    ctx.beginPath();
    ctx.ellipse(0,0,5,4.5,0,0,Math.PI*2);
    const hg=ctx.createRadialGradient(-1,-1,1,0,0,5);
    hg.addColorStop(0,'#8b3a2a');
    hg.addColorStop(1,'#5c1f10');
    ctx.fillStyle=hg; ctx.fill();
    ctx.strokeStyle='#3d1008'; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.restore();
}

function drawFlame(x,y,ang){
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
  // 外焰
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-6,-8,-8,-18,-2,-28);
  ctx.bezierCurveTo(0,-22,4,-20,3,-28);
  ctx.bezierCurveTo(8,-18,6,-8,0,0);
  ctx.closePath();
  const fg=ctx.createLinearGradient(0,0,0,-28);
  fg.addColorStop(0,'#ff6a00');
  fg.addColorStop(0.5,'#ffb300');
  fg.addColorStop(1,'#fff176');
  ctx.fillStyle=fg; ctx.fill();
  // 内焰
  ctx.beginPath();
  ctx.moveTo(0,-2);
  ctx.bezierCurveTo(-3,-10,-2,-18,0,-22);
  ctx.bezierCurveTo(2,-18,3,-10,0,-2);
  ctx.closePath();
  const fi=ctx.createLinearGradient(0,-2,0,-22);
  fi.addColorStop(0,'#fff9c4');
  fi.addColorStop(1,'#fffde7');
  ctx.fillStyle=fi; ctx.globalAlpha=0.7; ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawStickMan(x, y, moving) {
  ctx.save(); ctx.translate(x, y);

  // 行走摆动：tick全局可用，moving控制是否动
  const t = G.tick * 0.15;
  const swing = moving ? Math.sin(t) : 0;
  const bounce = moving ? Math.abs(Math.sin(t)) * 4 : 0;

  ctx.translate(0, -bounce);

  // 头部火柴头
  ctx.save(); ctx.translate(0, -38);
  ctx.beginPath(); ctx.ellipse(0,0,5.5,5,0,0,Math.PI*2);
  const hg=ctx.createRadialGradient(-1,-1,1,0,0,5.5);
  hg.addColorStop(0,'#8b3a2a'); hg.addColorStop(1,'#5c1f10');
  ctx.fillStyle=hg; ctx.fill();
  ctx.strokeStyle='#3d1008'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.restore();

  // 头到肩
  drawMatchStick(0,-38, 0,-18, false);
  // 躯干
  drawMatchStick(0,-18, 0,6, false);

  // ── 左臂（持枪）：向前时抬起，向后时放下 ──
  const lArmX = -18 - swing * 6;
  const lArmY = -4 + swing * 8;
  drawMatchStick(0,-10, lArmX, lArmY, true);
  // 枪跟随左臂
  ctx.save(); ctx.translate(lArmX, lArmY);
  ctx.rotate(swing * 0.2);
  ctx.fillStyle='#1f2937';
  ctx.beginPath(); rrect(ctx,-18,-4,18,7,2); ctx.fill();
  ctx.fillStyle='#374151';
  ctx.beginPath(); ctx.rect(-26,-3,10,4); ctx.fill();
  ctx.strokeStyle='#4b5563'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(-8,5,4,0,Math.PI); ctx.stroke();
  ctx.fillStyle='#6b7280';
  ctx.beginPath(); ctx.rect(-28,-2,4,2); ctx.fill();
  ctx.restore();

  // ── 右臂（举燃烧火柴，反向摆动）──
  const rArmX = 16 + swing * 4;
  const rArmY = -18 - swing * 6;
  drawMatchStick(0,-10, rArmX, rArmY, false);
  // 火柴棍延伸
  const r2X = rArmX + 10;
  const r2Y = rArmY - 12;
  drawMatchStick(rArmX, rArmY, r2X, r2Y, true);
  // 火焰
  drawFlame(r2X, r2Y, -0.2 + swing * 0.15);

  // ── 左腿（大腿+小腿，与右腿反向）──
  const lThighX = -12 + swing * 14;
  const lThighY = 24;
  drawMatchStick(0,6, lThighX, lThighY, false);
  const lShinX = lThighX - swing * 8;
  const lShinY = lThighY + 16;
  drawMatchStick(lThighX, lThighY, lShinX, lShinY, true);

  // ── 右腿（大腿+小腿，反向摆动）──
  const rThighX = 12 - swing * 14;
  const rThighY = 24;
  drawMatchStick(0,6, rThighX, rThighY, false);
  const rShinX = rThighX + swing * 8;
  const rShinY = rThighY + 16;
  drawMatchStick(rThighX, rThighY, rShinX, rShinY, true);

  ctx.restore();
}

function drawFurball(e){
  const s=worldToScreen(e.x,e.y);
  if(s.x<-80||s.x>VW+80||s.y<-80||s.y>VH+80) return;
  const r=e.size;
  // 走路摆动
  const bob = Math.sin(G.tick*0.1)*2;
  ctx.save(); ctx.translate(e.x, e.y+bob);

  // 1. 地面阴影
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(2,r+6,r*0.9,r*0.28,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 2. 超长棍子武器（画在身体后面）
  ctx.save();
  ctx.strokeStyle='#7c4a1e'; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(r*0.6,-2); ctx.lineTo(r+52,-16); ctx.stroke();
  // 棍子木纹
  ctx.strokeStyle='rgba(50,25,5,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(r*0.8,-4); ctx.lineTo(r+20,-10); ctx.stroke();
  ctx.restore();

  // 3. 细线腿（像图片中的细铁丝腿）
  ctx.strokeStyle='#111'; ctx.lineWidth=1.8; ctx.lineCap='round';
  // 左腿：往左弯
  const legSwing = Math.sin(G.tick*0.12)*6;
  ctx.beginPath();
  ctx.moveTo(-r*0.35, r*0.75);
  ctx.lineTo(-r*0.5+legSwing, r+8);
  ctx.lineTo(-r*0.6+legSwing, r+16);
  ctx.stroke();
  // 左脚圆点
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-r*0.6+legSwing, r+17, 2.8, 0, Math.PI*2); ctx.fill();

  // 右腿：往右弯
  ctx.beginPath();
  ctx.moveTo(r*0.35, r*0.75);
  ctx.lineTo(r*0.5-legSwing, r+8);
  ctx.lineTo(r*0.6-legSwing, r+16);
  ctx.stroke();
  // 右脚圆点
  ctx.beginPath(); ctx.arc(r*0.6-legSwing, r+17, 2.8, 0, Math.PI*2); ctx.fill();

  // 4. 毛茸茸身体（多层叠加模拟毛发）
  // 最外层毛发光晕
  const fuzz = ctx.createRadialGradient(0,0,r*0.5,0,0,r*1.35);
  fuzz.addColorStop(0,'rgba(15,15,15,0)');
  fuzz.addColorStop(0.7,'rgba(10,10,10,0.4)');
  fuzz.addColorStop(1,'rgba(5,5,5,0)');
  ctx.fillStyle=fuzz;
  ctx.beginPath(); ctx.arc(0,0,r*1.35,0,Math.PI*2); ctx.fill();

  // 毛刺（短线条，随机朝外）
  for(let i=0;i<28;i++){
    const a=(i/28)*Math.PI*2;
    const jr=r*(0.88+Math.sin(i*7.3)*0.12);
    const ox=Math.cos(a)*jr, oy=Math.sin(a)*jr;
    const len=2+Math.abs(Math.sin(i*3.1))*5;
    ctx.strokeStyle=`rgba(${8+i%10},${8+i%8},${8+i%6},0.85)`;
    ctx.lineWidth=1+Math.sin(i*2)*0.5;
    ctx.beginPath();
    ctx.moveTo(ox*0.82,oy*0.82);
    ctx.lineTo(ox+Math.cos(a)*len, oy+Math.sin(a)*len);
    ctx.stroke();
  }

  // 主体黑球（径向渐变，左上亮右下暗）
  const bg=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.05, 0,0,r);
  bg.addColorStop(0,'#3a3a3a');
  bg.addColorStop(0.4,'#1a1a1a');
  bg.addColorStop(1,'#080808');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

  // 内层毛感（叠加少量绒毛纹理）
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2 + 0.2;
    const jr=r*(0.6+Math.random()*0.35);
    ctx.strokeStyle='rgba(50,50,50,0.25)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*jr*0.5, Math.sin(a)*jr*0.5);
    ctx.lineTo(Math.cos(a)*jr, Math.sin(a)*jr);
    ctx.stroke();
  }

  // 5. 大白眼睛（图片中最明显的特征）
  const eyeR=r*0.28;
  // 左眼白
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-r*0.3,-r*0.15,eyeR,0,Math.PI*2); ctx.fill();
  // 右眼白
  ctx.beginPath(); ctx.arc(r*0.3,-r*0.15,eyeR,0,Math.PI*2); ctx.fill();
  // 左瞳孔
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-r*0.28,-r*0.13,eyeR*0.52,0,Math.PI*2); ctx.fill();
  // 右瞳孔
  ctx.beginPath(); ctx.arc(r*0.32,-r*0.13,eyeR*0.52,0,Math.PI*2); ctx.fill();
  // 眼睛高光
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(-r*0.24,-r*0.22,eyeR*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.36,-r*0.22,eyeR*0.22,0,Math.PI*2); ctx.fill();

  // 6. 顶部高光（增加立体感）
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.arc(-r*0.2,-r*0.35,r*0.45,0,Math.PI*2); ctx.fill();

  drawHpBar(e, r+26);
  if(e.weapon.hp>0) drawWBar(e, r+34, e.weapon.hp/e.weapon.maxHp,'#d97706');
  ctx.restore();
}

function drawDiamond(e){
  const s=worldToScreen(e.x,e.y);
  if(s.x<-80||s.x>VW+80||s.y<-80||s.y>VH+80) return;
  const r=e.size;
  const bob=Math.sin(G.tick*0.09)*2;
  const wobble=Math.sin(G.tick*0.05)*0.1;
  ctx.save(); ctx.translate(e.x, e.y+bob); ctx.rotate(wobble);

  // 阴影
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(1,r*1.5,r*0.85,r*0.25,0,0,Math.PI*2); ctx.fill();

  // 细铁丝腿
  const ls=Math.sin(G.tick*0.11)*5;
  ctx.strokeStyle='#1e40af'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-r*0.3,r*0.8); ctx.lineTo(-r*0.45+ls,r*1.25); ctx.lineTo(-r*0.55+ls,r*1.6);
  ctx.stroke();
  ctx.fillStyle='#1e3a8a';
  ctx.beginPath(); ctx.arc(-r*0.55+ls,r*1.62,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r*0.3,r*0.8); ctx.lineTo(r*0.45-ls,r*1.25); ctx.lineTo(r*0.55-ls,r*1.6);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(r*0.55-ls,r*1.62,2.5,0,Math.PI*2); ctx.fill();

  // 钻石武器（小钻石，右手拿）
  ctx.save(); ctx.translate(r*1.1,-r*0.2);
  ctx.strokeStyle='#93c5fd'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-r*0.55); ctx.lineTo(r*0.4,0); ctx.lineTo(0,r*0.55); ctx.lineTo(-r*0.4,0);
  ctx.closePath();
  const wg=ctx.createLinearGradient(0,-r*0.55,0,r*0.55);
  wg.addColorStop(0,'rgba(191,219,254,0.9)'); wg.addColorStop(0.5,'rgba(59,130,246,0.85)'); wg.addColorStop(1,'rgba(30,58,138,0.9)');
  ctx.fillStyle=wg; ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.moveTo(-r*0.1,-r*0.35); ctx.lineTo(0,-r*0.05); ctx.lineTo(-r*0.2,-r*0.05); ctx.closePath(); ctx.fill();
  ctx.restore();

  // 主体钻石形状（半透明蓝，发光感）
  // 外发光
  const glow=ctx.createRadialGradient(0,0,r*0.3,0,0,r*1.6);
  glow.addColorStop(0,'rgba(59,130,246,0.25)');
  glow.addColorStop(1,'rgba(59,130,246,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(0,0,r*1.6,0,Math.PI*2); ctx.fill();

  // 钻石轮廓
  ctx.beginPath();
  ctx.moveTo(0,-r*1.35); ctx.lineTo(r*0.9,-r*0.1);
  ctx.lineTo(r*0.6,r*0.85); ctx.lineTo(0,r*1.0);
  ctx.lineTo(-r*0.6,r*0.85); ctx.lineTo(-r*0.9,-r*0.1);
  ctx.closePath();
  const dg=ctx.createLinearGradient(-r,-r*1.35,r,r);
  dg.addColorStop(0,'rgba(191,219,254,0.88)');
  dg.addColorStop(0.4,'rgba(96,165,250,0.82)');
  dg.addColorStop(1,'rgba(29,78,216,0.85)');
  ctx.fillStyle=dg; ctx.fill();
  ctx.strokeStyle='rgba(147,197,253,0.9)'; ctx.lineWidth=1.5; ctx.stroke();

  // 内部切面线
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-r*1.35); ctx.lineTo(0,r*1.0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r*0.9,-r*0.1); ctx.lineTo(r*0.9,-r*0.1); ctx.stroke();
  // 高光
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.moveTo(0,-r*1.35); ctx.lineTo(-r*0.9,-r*0.1); ctx.lineTo(-r*0.2,-r*0.3); ctx.closePath(); ctx.fill();

  // 大白眼睛
  const eyeR=r*0.26;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-r*0.28,-r*0.05,eyeR,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.28,-r*0.05,eyeR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e3a8a';
  ctx.beginPath(); ctx.arc(-r*0.26,-r*0.03,eyeR*0.54,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.30,-r*0.03,eyeR*0.54,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(-r*0.22,-r*0.12,eyeR*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.34,-r*0.12,eyeR*0.22,0,Math.PI*2); ctx.fill();

  drawHpBar(e, r*1.5+18);
  if(e.weapon.hp>0) drawWBar(e, r*1.5+26, e.weapon.hp/e.weapon.maxHp,'#1d4ed8');
  ctx.restore();
}

function drawTriangle(e){
  const s=worldToScreen(e.x,e.y);
  if(s.x<-60||s.x>VW+60||s.y<-60||s.y>VH+60) return;
  const sz=e.size;
  const bob=Math.sin(G.tick*0.13+e.id)*1.5;
  const wobble=Math.sin(G.tick*0.07+e.id)*0.08;
  ctx.save(); ctx.translate(e.x, e.y+bob); ctx.rotate(wobble);

  // 阴影
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(1,sz+8,sz*0.9,sz*0.22,0,0,Math.PI*2); ctx.fill();

  // 细腿
  const ls=Math.sin(G.tick*0.13+e.id)*4;
  ctx.strokeStyle='#991b1b'; ctx.lineWidth=1.6; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-sz*0.25,sz*0.7); ctx.lineTo(-sz*0.4+ls,sz+5); ctx.lineTo(-sz*0.5+ls,sz+12);
  ctx.stroke();
  ctx.fillStyle='#7f1d1d';
  ctx.beginPath(); ctx.arc(-sz*0.5+ls,sz+13,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sz*0.25,sz*0.7); ctx.lineTo(sz*0.4-ls,sz+5); ctx.lineTo(sz*0.5-ls,sz+12);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(sz*0.5-ls,sz+13,2.2,0,Math.PI*2); ctx.fill();

  // 迷你棒子武器
  ctx.save(); ctx.translate(sz*1.0,-sz*0.1);
  ctx.strokeStyle='#7f1d1d'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(sz*0.7,-sz*0.5); ctx.stroke();
  ctx.fillStyle='#991b1b';
  ctx.beginPath(); ctx.arc(sz*0.7,-sz*0.5,sz*0.18,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 外发光
  const glow=ctx.createRadialGradient(0,0,sz*0.2,0,0,sz*1.5);
  glow.addColorStop(0,'rgba(239,68,68,0.2)');
  glow.addColorStop(1,'rgba(239,68,68,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(0,sz*0.1,sz*1.5,0,Math.PI*2); ctx.fill();

  // 三角身体（圆角感）
  ctx.beginPath();
  ctx.moveTo(0,-sz*1.15);
  ctx.quadraticCurveTo(sz*0.15,-sz*0.1, sz*0.95,sz*0.85);
  ctx.quadraticCurveTo(sz*0.5,sz*1.05, -sz*0.95,sz*0.85);
  ctx.quadraticCurveTo(-sz*0.15,-sz*0.1, 0,-sz*1.15);
  const tg=ctx.createLinearGradient(0,-sz*1.15,0,sz);
  tg.addColorStop(0,'rgba(252,165,165,0.92)');
  tg.addColorStop(0.4,'rgba(239,68,68,0.9)');
  tg.addColorStop(1,'rgba(153,27,27,0.92)');
  ctx.fillStyle=tg; ctx.fill();
  ctx.strokeStyle='rgba(254,202,202,0.8)'; ctx.lineWidth=1.5; ctx.stroke();

  // 高光
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.moveTo(0,-sz*1.15); ctx.quadraticCurveTo(-sz*0.4,-sz*0.3,-sz*0.5,sz*0.1);
  ctx.quadraticCurveTo(-sz*0.2,-sz*0.4,0,-sz*1.15);
  ctx.fill();

  // 大白眼睛
  const eyeR=sz*0.25;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-sz*0.27,-sz*0.05,eyeR,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.27,-sz*0.05,eyeR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7f1d1d';
  ctx.beginPath(); ctx.arc(-sz*0.25,-sz*0.03,eyeR*0.54,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.29,-sz*0.03,eyeR*0.54,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(-sz*0.21,-sz*0.12,eyeR*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.33,-sz*0.12,eyeR*0.22,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawSquare(e){
  const s=worldToScreen(e.x,e.y);
  if(s.x<-60||s.x>VW+60||s.y<-60||s.y>VH+60) return;
  const sz=e.size;
  const bob=Math.sin(G.tick*0.1+e.id*0.5)*1.8;
  const wobble=Math.sin(G.tick*0.06+e.id)*0.07;
  ctx.save(); ctx.translate(e.x, e.y+bob); ctx.rotate(wobble);

  // 阴影
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(1,sz+7,sz*0.95,sz*0.24,0,0,Math.PI*2); ctx.fill();

  // 细腿
  const ls=Math.sin(G.tick*0.1+e.id*0.5)*4;
  ctx.strokeStyle='#92400e'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-sz*0.3,sz*0.85); ctx.lineTo(-sz*0.45+ls,sz+5); ctx.lineTo(-sz*0.55+ls,sz+13);
  ctx.stroke();
  ctx.fillStyle='#78350f';
  ctx.beginPath(); ctx.arc(-sz*0.55+ls,sz+14,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sz*0.3,sz*0.85); ctx.lineTo(sz*0.45-ls,sz+5); ctx.lineTo(sz*0.55-ls,sz+13);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(sz*0.55-ls,sz+14,2.5,0,Math.PI*2); ctx.fill();

  // 小棒子武器
  ctx.save(); ctx.translate(sz*1.05,0);
  ctx.strokeStyle='#78350f'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(sz*0.8,-sz*0.4); ctx.stroke();
  ctx.fillStyle='#92400e';
  ctx.beginPath(); ctx.arc(sz*0.8,-sz*0.4,sz*0.16,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 外发光
  const glow=ctx.createRadialGradient(0,0,sz*0.2,0,0,sz*1.6);
  glow.addColorStop(0,'rgba(251,191,36,0.2)');
  glow.addColorStop(1,'rgba(251,191,36,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(0,0,sz*1.6,0,Math.PI*2); ctx.fill();

  // 方形身体（圆角）
  ctx.beginPath();
  rrect(ctx,-sz,-sz,sz*2,sz*2,sz*0.28);
  const qg=ctx.createLinearGradient(-sz,-sz,sz,sz);
  qg.addColorStop(0,'rgba(254,240,138,0.95)');
  qg.addColorStop(0.4,'rgba(251,191,36,0.92)');
  qg.addColorStop(1,'rgba(180,120,10,0.92)');
  ctx.fillStyle=qg; ctx.fill();
  ctx.strokeStyle='rgba(255,245,180,0.85)'; ctx.lineWidth=1.8; ctx.stroke();

  // 顶面高光
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();
  rrect(ctx,-sz*0.85,-sz*0.85,sz*1.1,sz*0.9,sz*0.2);
  ctx.fill();

  // 边缘暗面
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.moveTo(sz*0.6,sz*0.2); ctx.lineTo(sz,sz); ctx.lineTo(-sz*0.2,sz); ctx.closePath();
  ctx.fill();

  // 大白眼睛
  const eyeR=sz*0.27;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-sz*0.3,-sz*0.1,eyeR,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.3,-sz*0.1,eyeR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#78350f';
  ctx.beginPath(); ctx.arc(-sz*0.28,-sz*0.08,eyeR*0.54,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.32,-sz*0.08,eyeR*0.54,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(-sz*0.24,-sz*0.18,eyeR*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz*0.36,-sz*0.18,eyeR*0.22,0,Math.PI*2); ctx.fill();

  drawHpBar(e, sz+22);
  if(e.weapon.hp>0) drawWBar(e, sz+30, e.weapon.hp/e.weapon.maxHp,'#d97706');
  ctx.restore();
}

function drawBullet(b){
  const s=worldToScreen(b.x,b.y);
  if(s.x<-20||s.x>VW+20||s.y<-20||s.y>VH+20) return;
  ctx.save(); ctx.translate(b.x,b.y);
  if(b.gold){ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;}
  else ctx.fillStyle='#d1d5db';
  ctx.beginPath(); ctx.arc(0,0,b.gold?5:3.5,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function drawDiamondProj(b){
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.angle||0);
  ctx.globalAlpha=0.9; ctx.fillStyle='#60a5fa';
  ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(5,0); ctx.lineTo(0,7); ctx.lineTo(-5,0); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=1; ctx.restore();
}

function drawHpBar(e,off){
  const bw=36,bh=4;
  ctx.fillStyle='#374151'; ctx.fillRect(-bw/2,-off-bh,bw,bh);
  ctx.fillStyle='#22c55e'; ctx.fillRect(-bw/2,-off-bh,bw*(e.hp/e.maxHp),bh);
}
function drawWBar(e,off,ratio,color){
  const bw=36,bh=3;
  ctx.fillStyle='#374151'; ctx.fillRect(-bw/2,-off-bh,bw,bh);
  ctx.fillStyle=color; ctx.fillRect(-bw/2,-off-bh,bw*ratio,bh);
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath(); rrect(ctx,6,6,240,90,8); ctx.fill();
  ctx.fillStyle='#fbbf24'; ctx.font='bold 12px Microsoft YaHei'; ctx.textAlign='left';
  ctx.fillText(`🟡 黄金子弹: ${G.goldBullets}   ⚪ 普通: ${G.normalBullets}`,14,24);
  ctx.fillStyle='#a3e635'; ctx.font='12px Microsoft YaHei';
  ctx.fillText(`得分: ${G.score}`,14,42);
  ctx.fillStyle='#f87171';
  ctx.fillText(`🖤 黑毛球: ${G.furballs.length}/3   💎 钻石怪: ${G.diamonds.length}/5`,14,58);
  ctx.fillStyle='#fb923c';
  ctx.fillText(`🔺 三角: ${G.triangles.length}/100   🟨 方怪: ${G.squares.length}/10`,14,74);
  ctx.fillStyle='#94a3b8'; ctx.font='11px Microsoft YaHei';
  ctx.fillText('消灭黑毛球和钻石怪获胜！',14,88);

  if(G.warning && G.warningTimer>0){
    ctx.fillStyle='rgba(220,38,38,0.88)';
    ctx.beginPath(); rrect(ctx,VW/2-130,VH-52,260,34,8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 13px Microsoft YaHei'; ctx.textAlign='center';
    ctx.fillText(G.warning,VW/2,VH-29);
  }
  ctx.restore();
}

// 小地图
function drawMinimap(){
  const mw=120, mh=80, mx=VW-mw-8, my=8;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); rrect(ctx,mx,my,mw,mh,6); ctx.fill();
  ctx.strokeStyle='#475569'; ctx.lineWidth=1.5;
  ctx.beginPath(); rrect(ctx,mx,my,mw,mh,6); ctx.stroke();

  const sx = x => mx + (x/WW)*mw;
  const sy = y => my + (y/WH)*mh;

  // 山洞
  ctx.fillStyle='#6b7280';
  ctx.beginPath(); ctx.arc(sx(CAVE.x),sy(CAVE.y),4,0,Math.PI*2); ctx.fill();

  // 怪物
  G.furballs.forEach(e=>{ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx(e.x),sy(e.y),3,0,Math.PI*2);ctx.fill();});
  G.diamonds.forEach(e=>{ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(sx(e.x),sy(e.y),2.5,0,Math.PI*2);ctx.fill();});
  G.triangles.filter(e=>e.aggro).forEach(e=>{ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(sx(e.x),sy(e.y),1.5,0,Math.PI*2);ctx.fill();});

  // 玩家
  const p=G.player;
  ctx.fillStyle='#fbbf24';
  ctx.beginPath(); ctx.arc(sx(p.x),sy(p.y),3.5,0,Math.PI*2); ctx.fill();

  // 视野框
  ctx.strokeStyle='rgba(251,191,36,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(sx(cam.x),sy(cam.y),(VW/WW)*mw,(VH/WH)*mh);

  ctx.fillStyle='#94a3b8'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('小地图',mx+mw/2,my+mh+12);
  ctx.restore();
}

function showOverlay(win){
  const el=document.getElementById('overlay');
  document.getElementById('overlayIcon').textContent=win?'🏆':'💀';
  document.getElementById('overlayTitle').textContent=win?'恭喜安安！':'安安被打倒了！';
  document.getElementById('overlayMsg').textContent=win?'消灭了所有大BOSS！':'躲避怪物，多进山洞补子弹！';
  document.getElementById('overlayScore').textContent=`得分: ${G.score}`;
  const btn=document.getElementById('restartBtn');
  btn.textContent=win?'再玩一次':'重新开始';
  btn.style.background=win?'#059669':'#dc2626';
  el.classList.add('show');
}

// initGame moved to window.load
// 全部在页面加载完成后启动，避免DOM未就绪导致的错误
window.addEventListener('load', () => {
  resizeCanvas();
  initWorldSize();
  initGame();
  requestAnimationFrame(loop);
});
</script>
