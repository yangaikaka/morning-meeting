<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨会摘要生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1a2e;--navy-light:#16213e;
  --gold:#c9a84c;--gold-light:#e8c96d;--gold-pale:#f5ecd3;
  --bg:#faf8f2;--white:#fff;
  --text:#1e1e2e;--muted:#6b6b7b;--border:#e8e2d4;
  --error:#d64045;--ok:#2d7d46;
  --r:16px;--sh:0 4px 24px rgba(26,26,46,.08);
}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}

/* NAV */
nav{background:var(--navy);border-bottom:2px solid var(--gold);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-size:1rem;font-weight:700;color:var(--gold);letter-spacing:.06em;display:flex;align-items:center;gap:9px}
.dot{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.65)}}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-sub{font-family:'DM Mono',monospace;font-size:.68rem;color:rgba(201,168,76,.55);letter-spacing:.12em;text-transform:uppercase}

/* VISITOR BADGE in nav */
.vis-badge{display:flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);letter-spacing:.04em}
.vis-badge .vis-num{font-size:.82rem;font-weight:700}
.vis-badge .vis-new{background:var(--gold);color:var(--navy);border-radius:10px;padding:1px 6px;font-size:.6rem;margin-left:2px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

/* LAYOUT */
.wrap{max-width:820px;margin:0 auto;padding:36px 20px 80px}

/* HERO */
.hero{text-align:center;padding:32px 0 24px;margin-bottom:32px}
.hero h1{font-size:1.9rem;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:6px}
.hero h1 em{font-style:normal;color:var(--gold)}
.hero p{font-size:.85rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.04em}
.rule{width:56px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:14px auto 0}

/* STATS ROW */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:120px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;box-shadow:var(--sh);text-align:center}
.stat-card .snum{font-size:1.6rem;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1.2}
.stat-card .slabel{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.05em;margin-top:3px}
.stat-card.highlight{border-color:var(--gold);background:linear-gradient(135deg,#fffdf5,#fdf6e3)}
.stat-card.highlight .snum{color:var(--gold)}
.stat-today{font-size:.65rem;color:var(--ok);font-family:'DM Mono',monospace;margin-top:2px}

/* CARD */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:18px;overflow:hidden}
.ch{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;background:linear-gradient(135deg,#fdfbf7,#f9f6ee)}
.ch .tag{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gold);background:var(--gold-pale);border:1px solid var(--gold);border-radius:4px;padding:2px 6px;letter-spacing:.07em}
.ch h2{font-size:.92rem;font-weight:600;color:var(--navy)}
.cb{padding:18px 22px}

/* CLOUD STATUS */
.cloud-bar{display:flex;align-items:center;justify-content:space-between;background:var(--gold-pale);border:1px solid var(--gold);border-radius:10px;padding:10px 16px;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.cloud-bar .cl{font-size:.8rem;color:var(--navy);display:flex;align-items:center;gap:7px}
.cloud-bar .cr{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#ccc;display:inline-block}
.sync-dot.on{background:var(--ok);animation:pulse
