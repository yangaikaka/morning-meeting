<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨会摘要生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-light: #2d2d4a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #faf8f2;
    --cream-dark: #f0ece0;
    --red: #c0392b;
    --green: #1a6b3c;
    --border: #d4c9a8;
    --shadow: rgba(26,26,46,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(26,26,46,0.04) 0%, transparent 60%);
  }

  header {
    background: var(--ink);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px var(--shadow);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 2px;
  }

  .logo-text p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gold-light);
    letter-spacing: 1px;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .upload-section {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: 0 2px 16px var(--shadow);
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .input-card {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }

  .input-card:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.04);
    transform: translateY(-1px);
  }

  .input-card.active {
    border-color: var(--gold);
    border-style: solid;
    background: rgba(201,168,76,0.06);
  }

  .input-card input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .card-icon { font-size: 28px; margin-bottom: 8px; }
  .card-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .card-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.5px;
  }

  .file-list {
    background: var(--cream-dark);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 12px;
    display: none;
  }

  .file-list.show { display: block; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--ink-light);
  }

  .text-input-area {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--cream);
    resize: vertical;
    min-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.8;
  }

  .text-input-area:focus {
    outline: none;
    border-color: var(--gold);
    background: white;
  }

  .text-input-area::placeholder { color: #bbb; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: #aaa;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .generate-btn:hover {
    background: var(--ink-light);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--shadow);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .loading-spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-section {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px var(--shadow);
    display: none;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    background: var(--ink);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 2px;
  }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  .action-btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid;
  }

  .btn-copy {
    background: transparent;
    border-color: var(--gold);
    color: var(--gold);
  }
  .btn-copy:hover { background: var(--gold); color: var(--ink); }

  .btn-copy.copied {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .result-body {
    padding: 32px 36px;
    font-size: 14px;
    line-height: 2;
    color: var(--ink);
    white-space: pre-wrap;
    font-family: 'Noto Serif SC', serif;
    min-height: 200px;
    border-bottom: 1px solid var(--border);
  }

  .result-footer {
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
  }

  .token-info {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #999;
    letter-spacing: 1px;
  }

  .error-box {
    background: #fff5f5;
    border: 1px solid #fcc;
    border-radius: 8px;
    padding: 16px;
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 16px 0 0;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    animation: progress 2s ease-in-out infinite;
    width: 40%;
  }

  @keyframes progress {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  @media (max-width: 600px) {
    header { padding: 20px; }
    main { padding: 24px 16px; }
    .input-grid { grid-template-columns: 1fr; }
    .upload-section { padding: 20px; }
    .result-body { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div class="logo-text">
      <h1>晨会摘要生成器</h1>
      <p>Morning Brief · AI Assistant</p>
    </div>
  </div>
  <div class="date-badge" id="dateDisplay"></div>
</header>

<main>
  <div class="upload-section">
    <div class="section-title">📥 上传研究素材</div>

    <div class="input-grid">
      <div class="input-card" id="audioCard">
        <input type="file" accept="audio/*,.mp3,.wav,.m4a,.aac" multiple onchange="handleFileUpload(this, 'audio')">
        <div class="card-icon">🎙️</div>
        <div class="card-label">录音文件</div>
        <div class="card-hint">MP3 / WAV / M4A</div>
      </div>
      <div class="input-card" id="docCard">
        <input type="file" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg" multiple onchange="handleFileUpload(this, 'doc')">
        <div class="card-icon">📄</div>
        <div class="card-label">研报文档</div>
        <div class="card-hint">PDF / Word / 图片</div>
      </div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="divider">或直接粘贴文字内容</div>

    <textarea
      class="text-input-area"
      id="textInput"
      placeholder="粘贴转录稿、研报文字、或直接输入晨会内容……"
    ></textarea>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill"></div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="generate-btn" id="generateBtn" onclick="generateSummary()">
      <div class="loading-spinner" id="spinner"></div>
      <span id="btnText">✨ 生成晨会摘要</span>
    </button>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-title">📨 今日晨会摘要</div>
      <div class="result-actions">
        <button class="action-btn btn-copy" id="copyBtn" onclick="copyResult()">复制全文</button>
      </div>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="result-footer">
      <div class="token-info" id="tokenInfo"></div>
    </div>
  </div>
</main>

<script>
  // Date display
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  // File tracking
  let uploadedFiles = { audio: [], doc: [] };
  let fileContents = [];

  function handleFileUpload(input, type) {
    const files = Array.from(input.files);
    uploadedFiles[type] = files;
    const card = document.getElementById(type === 'audio' ? 'audioCard' : 'docCard');
    card.classList.add('active');
    renderFileList();
  }

  function renderFileList() {
    const all = [...uploadedFiles.audio, ...uploadedFiles.doc];
    const list = document.getElementById('fileList');
    if (all.length === 0) { list.classList.remove('show'); return; }
    list.classList.add('show');
    list.innerHTML = all.map(f => `
      <div class="file-item">
        <span>${f.name.match(/\.(mp3|wav|m4a|aac)$/i) ? '🎙️' : '📄'}</span>
        <span>${f.name}</span>
        <span style="color:#bbb;margin-left:auto">${(f.size/1024).toFixed(0)}KB</span>
      </div>
    `).join('');
  }

  // Read file as text
  function readFileAsText(file) {
    return new Promise((resolve) => {
      if (file.type.startsWith('audio')) {
        resolve(`[音频文件：${file.name}，请先在外部转录后粘贴文字内容]`);
        return;
      }
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = () => resolve(`[无法读取文件：${file.name}]`);
      reader.readAsText(file, 'utf-8');
    });
  }

  const SYSTEM_PROMPT = `你是一位专业的证券销售，负责每天整理研究部的晨会资料，提炼核心观点，传达给投资者客户。

输出规范：
1. 分行业、分个股逐一小结，层次清晰
2. 数据优先：行业类重点提炼行业空间测算数据；个股类重点提炼估值依据（PE/PB/目标价/评级等）
3. 涉及上市公司必须标注股票代码，格式：公司名（代码），例如：宁德时代（300750）
4. 每个小节加合适的emoji图标，让内容生动活泼
5. 输出风格简洁专业，适合直接发送微信群
6. 如有多个行业，用分隔线或标题清晰区分
7. 结尾加一句简短的总结或市场展望`;

  async function generateSummary() {
    const textInput = document.getElementById('textInput').value.trim();
    const allFiles = [...uploadedFiles.audio, ...uploadedFiles.doc];

    if (!textInput && allFiles.length === 0) {
      showError('请上传文件或粘贴文字内容后再生成');
      return;
    }

    setLoading(true);

    try {
      // Gather content
      let contentParts = [];
      if (textInput) contentParts.push(textInput);

      for (const file of allFiles) {
        const text = await readFileAsText(file);
        contentParts.push(`【文件：${file.name}】\n${text}`);
      }

      const userContent = contentParts.join('\n\n---\n\n');

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: `请根据以下晨会素材，生成今日晨会摘要：\n\n${userContent}` }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `请求失败 ${response.status}`);
      }

      const data = await response.json();
      const result = data.content?.map(b => b.text || '').join('') || '';

      if (!result) throw new Error('AI返回内容为空，请重试');

      showResult(result, data.usage);

    } catch (err) {
      showError(err.message || '生成失败，请检查网络后重试');
    } finally {
      setLoading(false);
    }
  }

  function setLoading(loading) {
    const btn = document.getElementById('generateBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const progress = document.getElementById('progressBar');
    btn.disabled = loading;
    spinner.style.display = loading ? 'block' : 'none';
    btnText.textContent = loading ? '正在生成摘要…' : '✨ 生成晨会摘要';
    progress.style.display = loading ? 'block' : 'none';
    document.getElementById('errorBox').style.display = 'none';
  }

  function showResult(text, usage) {
    const section = document.getElementById('resultSection');
    const body = document.getElementById('resultBody');
    const tokenInfo = document.getElementById('tokenInfo');
    body.textContent = text;
    section.style.display = 'block';
    if (usage) {
      tokenInfo.textContent = `输入 ${usage.input_tokens} tokens · 输出 ${usage.output_tokens} tokens`;
    }
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠️ ' + msg;
    box.style.display = 'block';
  }

  async function copyResult() {
    const text = document.getElementById('resultBody').textContent;
    const btn = document.getElementById('copyBtn');
    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = '✅ 已复制';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '复制全文';
        btn.classList.remove('copied');
      }, 2000);
    } catch {
      btn.textContent = '复制失败';
    }
  }
</script>
</body>
</html>
