<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨会摘要生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a1a2e;
    --navy-light: #16213e;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --gold-pale: #f5ecd3;
    --bg: #faf8f2;
    --white: #ffffff;
    --text: #1e1e2e;
    --text-muted: #6b6b7b;
    --border: #e8e2d4;
    --error: #d64045;
    --success: #2d7d46;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(26,26,46,0.08);
  }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  nav {
    background: var(--navy);
    border-bottom: 2px solid var(--gold);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-logo .dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.7); }
  }
  .nav-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(201,168,76,0.6);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .hero {
    text-align: center;
    margin-bottom: 40px;
    padding: 36px 0 20px;
  }
  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .hero h1 span { color: var(--gold); }
  .hero p {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }
  .hero-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin: 16px auto 0;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #fdfbf7 0%, #f9f6ee 100%);
  }
  .card-header .section-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold);
    background: var(--gold-pale);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 2px 7px;
    letter-spacing: 0.08em;
  }
  .card-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--navy);
  }
  .card-body { padding: 20px 24px; }

  /* API KEY */
  .api-row { display: flex; gap: 10px; align-items: center; }
  .api-row .input-wrap { flex: 1; position: relative; }
  .api-row input {
    width: 100%;
    padding: 11px 44px 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-row input:focus { border-color: var(--gold); }
  .eye-btn {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 2px;
    display: flex; align-items: center; transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--gold); }
  .api-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem; color: var(--text-muted);
    margin-top: 8px; letter-spacing: 0.03em;
  }
  .api-hint .ok { color: var(--success); }
  .api-hint .err { color: var(--error); }

  /* TABS */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: var(--bg); border-radius: 10px;
    padding: 4px; border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 8px 4px; border: none;
    background: none; border-radius: 8px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem; color: var(--text-muted);
    cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--white); color: var(--navy);
    font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
